<!-- ⭐ AVALIAÇÕES -->
<section class="avaliacoes">
  <div class="container">

    <h2>Avaliações das clientes</h2>

    <div id="lista-avaliacoes" class="dep-container"></div>

    <div class="form-avaliacao">

      <input type="text" id="nome" placeholder="Seu nome">

      <textarea id="comentario" placeholder="Seu comentário"></textarea>

      <div class="estrelas" id="estrelas">
        <span data-star="1">★</span>
        <span data-star="2">★</span>
        <span data-star="3">★</span>
        <span data-star="4">★</span>
        <span data-star="5">★</span>
      </div>

      <button onclick="enviarAvaliacao()">Enviar avaliação</button>

    </div>

  </div>
</section>
